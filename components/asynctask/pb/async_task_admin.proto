syntax = "proto3";
package asynctask.v1;
option go_package = "github.com/xxzhwl/gaia/components/asynctask/pb;asynctaskpb";

import "google/protobuf/timestamp.proto";

service AsyncTaskAdmin {
  rpc SubmitTask(SubmitTaskReq) returns (SubmitTaskResp);
  rpc GetTask(GetTaskReq) returns (TaskItem);
  rpc ListTasks(ListTasksReq) returns (ListTasksResp);
  rpc RetryTask(RetryTaskReq) returns (Empty);
  rpc CancelTask(CancelTaskReq) returns (Empty);
  rpc ListRecords(ListRecordsReq) returns (ListRecordsResp);
  rpc GetStats(Empty) returns (TaskStatsResp);
  rpc ListSchedulers(Empty) returns (ListSchedulersResp);
  rpc GetScheduler(GetSchedulerReq) returns (SchedulerInfo);
  rpc StartScheduler(StartSchedulerReq) returns (Empty);
  rpc StopScheduler(StopSchedulerReq) returns (Empty);
  rpc GetAllMetrics(Empty) returns (AllMetricsResp);
}

message Empty {}

message TaskItem {
  int64 id = 1;
  string task_name = 2;
  string theme = 3;
  string service_name = 4;
  string method_name = 5;
  string arg = 6;
  string status = 7;
  int32 max_retry = 8;
  int32 retry_count = 9;
  string error_message = 10;
  int32 priority = 11;
  string tenant_id = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  string log_id = 15;
  google.protobuf.Timestamp last_run_time = 16;
  google.protobuf.Timestamp last_run_end_time = 17;
  int64 last_run_duration = 18;
  string last_result = 19;
}

message SubmitTaskReq {
  string theme = 1;
  string task_name = 2;
  string service_name = 3;
  string method_name = 4;
  string arg = 5;
  int32 priority = 6;
  string tenant_id = 7;
  int32 max_retry = 8;
}

message SubmitTaskResp { int64 id = 1; }

message GetTaskReq { int64 id = 1; }

message ListTasksReq {
  string theme = 1;
  string status = 2;
  string task_name = 3;
  string tenant_id = 4;
  int64 page = 5;
  int64 page_size = 6;
  repeated string task_statuses = 7;
}

message ListTasksResp {
  repeated TaskItem tasks = 1;
  int64 total = 2;
}

message RetryTaskReq { int64 id = 1; }
message CancelTaskReq { int64 id = 1; }

message TaskRecordItem {
  int64 id = 1;
  int64 task_id = 2;
  string task_name = 3;
  string worker_id = 4;
  string status = 5;
  string error_message = 6;
  int64 duration_ms = 7;
  google.protobuf.Timestamp created_at = 8;
  string log_id = 9;
  string result = 10;
}

message ListRecordsReq {
  int64 task_id = 1;
  string status = 2;
  int64 page = 3;
  int64 page_size = 4;
}

message ListRecordsResp {
  repeated TaskRecordItem records = 1;
  int64 total = 2;
}

message SchedulerInfo {
  string theme = 1;
  bool is_running = 2;
  int32 worker_count = 3;
  int64 queue_depth = 4;
  int64 success_total = 5;
  int64 failed_total = 6;
  string started_at = 7;
  int64 scans = 8;
  int64 push_tasks = 9;
  int64 pull_tasks = 10;
  int64 exec_tasks = 11;
  int64 exec_success = 12;
  int64 exec_fails = 13;
  int32 running_workers = 14;
  int32 all_workers = 15;
}

message ListSchedulersResp {
  repeated SchedulerInfo schedulers = 1;
}

message GetSchedulerReq { string theme = 1; }

message StartSchedulerReq {
  string theme = 1;
  int32 worker_count = 2;
}

message StopSchedulerReq { string theme = 1; }

message TaskStatsResp {
  int64 total_pending = 1;
  int64 total_running = 2;
  int64 total_success = 3;
  int64 total_failed = 4;
}

message MetricItem {
  string name = 1;
  int64 value = 2;
}

message AllMetricsResp {
  repeated MetricItem metrics = 1;
}
